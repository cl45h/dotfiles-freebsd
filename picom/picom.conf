# Backend
backend = "glx";
vsync = true;

# Shadows
shadow = true;
shadow-radius = 12;
shadow-offset-x = -12;
shadow-offset-y = -12;
shadow-opacity = 0.5;
shadow-color = "#1e1e2e";

# Fading
fading = true;
fade-in-step = 0.03;
fade-out-step = 0.03;
fade-delta = 4;

# Opacity
active-opacity = 1.0;
inactive-opacity = 0.92;
frame-opacity = 1.0;
inactive-opacity-override = false;

opacity-rule = [
  "100:class_g = 'telegram' && focused",
  "100:class_g = 'telegram' && focused",
  "100:class_g = 'waterfox' && focused",
  "100:class_g = 'waterfox' && !focused",
  "100:class_g = 'Chromium' && focused",
  "100:class_g = 'Chromium' && !focused",
  "100:class_g = 'discord' && focused",
  "100:class_g = 'discord' && !focused",
  "100:class_g = 'st-256color' && focused",
  "90:class_g = 'st-256color' && !focused"
];

# Animations
animations = true;
animation-stiffness = 200;
animation-dampening = 25;
animation-mass = 1;
animation-for-open-window = "zoom";
animation-for-unmap-window = "squeeze";
animation-for-transient-window = "slide-up";

# Blur
blur-method = "dual_kawase";
blur-strength = 3;
blur-background = false;

# Rounded corners
corner-radius = 7;
rounded-corners-exclude = [
  "class_g = 'dwm'",
  "class_g = 'dmenu'"
];

use-damage = true;
